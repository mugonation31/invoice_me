<div class="login-container">
  <div class="login-card">
    <!-- Page Title -->
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your Invoice Me account</p>

    <!-- Login Form -->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <!-- Email Input -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter your email"
          required
          [disabled]="loading"
        />
      </div>

      <!-- Password Input -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          required
          [disabled]="loading"
        />
      </div>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="login-button"
        [disabled]="loading"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <!-- Link to Signup -->
    <div class="signup-link">
      Don't have an account?
      <a routerLink="/signup">Sign up</a>
    </div>
  </div>
</div>
