<div class="invoice-form-container">
  <div class="form-wrapper">
    <h1 class="form-title">{{ isEditMode ? 'Edit Invoice' : 'New Invoice' }}</h1>

    <!-- Error Message -->
    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <form [formGroup]="invoiceForm" (ngSubmit)="onSubmit()" class="invoice-form">
      <!-- Client Selector -->
      <div class="form-group">
        <label for="client_id" class="form-label">
          Client <span class="required">*</span>
        </label>
        <select
          id="client_id"
          formControlName="client_id"
          class="form-input"
        >
          <option value="">Select a client</option>
          <option *ngFor="let client of clients" [value]="client.id">
            {{ client.name }}
          </option>
        </select>
      </div>

      <!-- Dates Row -->
      <div class="form-row">
        <div class="form-group">
          <label for="issue_date" class="form-label">Issue Date</label>
          <input
            type="date"
            id="issue_date"
            formControlName="issue_date"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label for="due_date" class="form-label">
            Due Date <span class="required">*</span>
          </label>
          <input
            type="date"
            id="due_date"
            formControlName="due_date"
            class="form-input"
          />
        </div>
      </div>

      <!-- Line Items -->
      <div class="line-items-section">
        <h2 class="section-title">Line Items</h2>

        <div class="line-items-header">
          <span class="col-description">Description</span>
          <span class="col-quantity">Qty</span>
          <span class="col-rate">Rate</span>
          <span class="col-amount">Amount</span>
          <span class="col-action"></span>
        </div>

        <div formArrayName="line_items">
          <div
            *ngFor="let item of lineItems.controls; let i = index"
            [formGroupName]="i"
            class="line-item-row"
          >
            <input
              type="text"
              formControlName="description"
              class="form-input col-description"
              placeholder="Description"
            />
            <input
              type="number"
              formControlName="quantity"
              class="form-input col-quantity"
              min="0.01"
              step="0.01"
            />
            <input
              type="number"
              formControlName="rate"
              class="form-input col-rate"
              min="0"
              step="0.01"
            />
            <span class="col-amount line-item-amount">
              {{ formatCurrency(getLineItemAmount(i)) }}
            </span>
            <button
              type="button"
              class="btn-remove-item"
              (click)="removeLineItem(i)"
              *ngIf="lineItems.length > 1"
            >
              X
            </button>
          </div>
        </div>

        <button type="button" class="btn-add-item" (click)="addLineItem()">
          + Add Line Item
        </button>
      </div>

      <!-- Tax Rate -->
      <div class="form-group">
        <label for="tax_rate" class="form-label">Tax Rate (%)</label>
        <input
          type="number"
          id="tax_rate"
          formControlName="tax_rate"
          class="form-input tax-input"
          min="0"
          step="0.01"
        />
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label for="notes" class="form-label">Notes</label>
        <textarea
          id="notes"
          formControlName="notes"
          class="form-input form-textarea"
          placeholder="Optional notes"
          rows="3"
        ></textarea>
      </div>

      <!-- Totals -->
      <div class="totals-section">
        <div class="total-row">
          <span class="total-label">Subtotal</span>
          <span class="total-value">{{ formatCurrency(subtotal) }}</span>
        </div>
        <div class="total-row">
          <span class="total-label">Tax</span>
          <span class="total-value">{{ formatCurrency(taxAmount) }}</span>
        </div>
        <div class="total-row total-due">
          <span class="total-label">Total Due</span>
          <span class="total-value">{{ formatCurrency(totalDue) }}</span>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-submit"
          [disabled]="invoiceForm.invalid || loading"
        >
          {{ isEditMode ? 'Update Invoice' : 'Save as Draft' }}
        </button>
      </div>
    </form>
  </div>
</div>
